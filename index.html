<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#cfead6"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="پلنر ۱۴۰۵"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icons/icon-192.png"><link rel="stylesheet" href="styles.css?v=supabase1"><title>پلنر ابری ۱۴۰۵ - Supabase</title></head><body><div class="shell"><aside><div class="brand"><b>۱۴۰۵</b><div><h1>پلنر حرفه‌ای</h1><p>روزانه، هفتگی، ماهانه، سالانه</p></div></div><nav id="sideNav"></nav><div class="note">حالت فعلی: آماده اتصال به Supabase. پس از ورود، اطلاعات بین دستگاه‌ها همگام می‌شود.</div></aside><main><header><div><small>تقویم شمسی ۱۴۰۵</small><h2 id="pageTitle">داشبورد مدیریتی</h2><p id="todayText"></p></div><div class="actions"><button id="addBtn" class="primary">+ ثبت فعالیت</button><button id="pdfBtn">خروجی PDF</button><button id="cloudLoginBtn" class="cloudTopBtn" type="button">ورود ابری</button></div></header><section id="reminders" class="warn hide"></section><section id="app"></section></main></div><nav id="bottomNav" class="bottom"></nav><dialog id="taskDialog"><form id="taskForm"><div class="dlgHead"><h3 id="dlgTitle">ثبت فعالیت</h3><button type="button" id="closeDlg">×</button></div><input type="hidden" id="id"><div class="formGrid"><label class="wide">عنوان<input id="title" required></label><label class="wide">توضیحات<textarea id="desc"></textarea></label><label>تاریخ شمسی<input id="jdate" required placeholder="1405-04-03"></label><label>شروع<input id="start" type="time"></label><label>پایان<input id="end" type="time"></label><label>نوع<select id="type"></select></label><label>اولویت<select id="priority"></select></label><label>وضعیت<select id="status"></select></label><label>دسته‌بندی<input id="category" list="cats"></label><datalist id="cats"></datalist><label>تکرار<select id="repeat"></select></label><label>یادآور داخلی<select id="reminder"></select></label><label>درصد پیشرفت<input id="progress" type="range" min="0" max="100" step="5"><span id="pval">۰٪</span></label><label class="wide">یادداشت<textarea id="notes"></textarea></label></div><footer><button type="button" id="delBtn" class="danger hide">حذف</button><span></span><button type="button" id="cancelBtn">انصراف</button><button class="primary">ذخیره</button></footer></form></dialog><dialog id="authDialog"><form id="authForm" class="authForm"><div class="dlgHead"><h3>ورود ابری</h3><button type="button" id="closeAuth">×</button></div><p class="muted">برای همگام‌سازی بین آیفون، لپ‌تاپ و مرورگرهای دیگر وارد حساب Supabase خودت شو.</p><label>ایمیل<input id="authEmail" type="email" autocomplete="email" required placeholder="you@example.com"></label><label>رمز عبور<input id="authPass" type="password" autocomplete="current-password" required minlength="6" placeholder="حداقل ۶ کاراکتر"></label><div class="authActions"><button class="primary" id="signInBtn" type="submit">ورود</button><button id="signUpBtn" type="button">ساخت حساب</button><button id="forceCloudBtn" type="button" class="hide">آپلود لوکال به ابر</button><button id="signOutBtn" type="button" class="danger hide">خروج</button></div><div id="authMsg" class="cloudMsg"></div></form></dialog><section id="printArea"></section><script>
